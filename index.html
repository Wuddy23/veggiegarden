<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idle 3D Vegetable Garden</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-card">
    <span class="hud-label">🌱 Points</span>
    <span class="hud-value" id="points">50</span>
  </div>
  <div class="hud-card">
    <span class="hud-label">✅ Ready</span>
    <span class="hud-value" id="plots-ready">0</span>
    <span class="hud-label">/ <span id="plots-total">9</span></span>
  </div>
</div>

<!-- Shop -->
<div id="shop-panel">
  <h3>🛒 Upgrades</h3>
  <div id="upgrades-list"></div>
</div>

<!-- Plant Menu -->
<div id="plant-menu" class="hidden">
  <div class="menu-header">
    <h3>🌱 Choose a Vegetable</h3>
    <button id="close-plant-menu">✕</button>
  </div>
  <div id="veggie-options"></div>
</div>

<!-- Toast -->
<div id="toast" class="hidden"></div>

<!-- Hint (desktop only) -->
<div id="hint">Click a plot to plant · Click a glowing plant to harvest · Drag to rotate</div>

<!-- Shop FAB (mobile only) -->
<button id="shop-toggle" aria-label="Open upgrades shop">🛒</button>

<!-- Backdrop for mobile drawers -->
<div id="backdrop"></div>

<!-- Three.js r128 + OrbitControls -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<!-- Game scripts -->
<script src="js/vegetables.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>

</body>
</html>
